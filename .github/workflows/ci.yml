name: Pipeline CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: dev_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Récupère le code
        uses: actions/checkout@v3

      - name: Installe Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installe les dépendances
        run: pip install psycopg2-binary dbt-postgres

      - name: Ingestion des données
        run: python ingest.py

      - name: DBT run
        run: |
          cd dbt/sales_project
          dbt run

      - name: DBT test
        run: |
          cd dbt/sales_project
          dbt test